<body class="legacy-page align-left">
    <header>

    </header>
    <main>
        
    <div class="team-section">
      <div class="item">
          
          <div class="image-wrapper team-image">
            <img src="../../../camisas/italia/juventus/01_26_2/juv3132_1.jpg" alt="Team" loading="lazy">

          <!-- Caption removed from inside image as requested -->
      </div>
    </div>
  
        
    <div class="shirt-group">
      <div class="group-items">
        
          <div class="item">
              
              <div class="image-wrapper">
                <img src="../../../camisas/italia/juventus/01_26_2/juv3132_2.jpg" alt="Item" loading="lazy">
              </div>
              
              <!-- Individual caption removed as requested -->
          </div>
        
          <div class="item">
              
              <div class="image-wrapper">
                <img src="../../../camisas/italia/juventus/09_24/20240625_214633.jpg" alt="Item" loading="lazy">
              </div>
              
              <!-- Individual caption removed as requested -->

          <div class="item">
              
              <div class="image-wrapper">
                <img src="../../../camisas/italia/juventus/09_24/20240625_214612.jpg" alt="Item" loading="lazy">

      </div>

    </div>
  
        
    </main>
    
    
    <footer>
        <a href="javascript:history.back()" class="back-link">VOLTAR / BACK</a>
    </footer>
    <script>
      document.addEventListener('click', (e) => {
        const link = e.target.closest('a');
        if (link && link.href && link.href.startsWith(window.location.origin)) {
          if (link.href.includes('javascript') || link.href.includes('#')) return;
          const path = link.href.replace(window.location.origin, '');
          window.parent.postMessage({ type: 'NAVIGATE', path }, '*');
        }
      });
      const sh = () => { window.parent.postMessage({ type: 'RESIZE', height: document.documentElement.scrollHeight }, '*'); };
      window.addEventListener('load', sh); window.addEventListener('resize', sh); setTimeout(sh, 500);
      setInterval(sh, 2000);
    </script>
</body>
</html>
